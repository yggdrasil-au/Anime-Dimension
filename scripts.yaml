##
# Scripts Configuration File, used by yaml-run to run scripts defined here instead of package.json scripts
# This allows for more complex scripts with series and parallel steps and variables defined in vars.yaml and even import from JS and Json files.
#
# all scripts normally found in package.json scripts section
#
# main scripts are:
#   - build: build simply produces the website in www/
#   - production: builds the website with optimization, linting, etc.
#   - dev: builds the website and starts a local apache server with watch mode
#   - dev-prod: same as dev but uses production build
#
#   - dotnet:run: runs the .NET API in debug mode locally, accessible at http://localhost:5000 or beta.platinum-hot-and-cold.com
#   - dotnet:build-release-linux: builds the .NET API for Linux deployment
#   - dotnet:build-release-win: builds the .NET API for Windows deployment
#
#   - deploy-all-prod: builds and deploys everything to production servers, website, API, and prod config files
#   - deploy-prod: builds the prod site and dotnet api and deploys to the server
#   - ww-d: builds and deploys only the website to the server
#   - api-d: builds and deploys only the .NET API to the server
#   - update-api-www-no-build and update-api-www: updates website embedded in the dotnet api from the astro build, one builds astro first, the other does not,
#     the dotnet:build-release-linux runs no build making it rely on existing astro build
#
#   - Most Other scripts are sub-scripts used by the main scripts, but most can be run directly when testing or debugging specific parts of the build process
##

#
# command line example:
#   in webdev root:
#       deno task --filter anime-dimension yaml-run dev
#   in anime-dimension main dir:
#       deno task yaml-run dev
#


scripts:
    # --- Utilities ---
    clean:
        - "fs: rm \"{{paths.www}}\""
    clean-www-website-html:
        - "fs: rm \"{{paths.web_root}}/**/*.html\""
    clean-www-dist-html:
        - "fs: rm \"{{paths.web_dist}}/**/*.html\""


    # watch-updates.mjs
    watch: "path: deno run --allow-write --allow-read --allow-run scripts/watch-updates.ts"

    # tasks executed by the watch-updates.ts tool for regenerating files on astro file content change
    astro-tasks:
        series:
            - clean-www-dist-html
            - clean-www-website-html
            - docs-compile
            - docs-format
            - move-astro-output-to-dist
            - assets:handle

    lint:
        parallel:
            - js-lint
            - css-lint
            - docs-lint

    # --- Icons & Assets ---
    copy-icons:bi:
        series:
            - "fs: mkdir {{paths.bi_dist}}"
            - "fs: copy {{paths.bi_src}}/* {{paths.bi_dist}}"

    copy-icons:fa:
        series:
            - "fs: mkdir {{paths.fa_dist}}"
            - "fs: copy {{paths.fa_src}} {{paths.fa_dist}}"

    copy-icons:www:
        series:
            - copy-icons:bi
            - copy-icons:fa

    assets:icons: copy-icons:www

    webp:
        series:
            - "fs: mkdir ./{{paths.img_dist}}"
            - "workspace: ygg-webp --inputDir ./{{paths.img_src}} --outputDir ./{{paths.img_dist}} --configPath ./{{paths.webp_conf}}"

    assets:handle:  "path: deno run --allow-read --allow-run --allow-write scripts/asset-handler.mjs --split"
    assets:prod:    "path: deno run --allow-read --allow-run --allow-write scripts/asset-handler.mjs --production"
    assets:dev:     "path: deno run --allow-read --allow-run --allow-write scripts/asset-handler.mjs --dev"
    assets:prepare: "path: deno run --allow-read --allow-run --allow-write scripts/asset-handler.mjs --prepare"

    appAssetsGen: >
        workspace:capacitor-assets generate --android --pwa
        --pwaOutRoot {{paths.pwa_out}}
        --pwaIconsPath {{paths.pwa_icons}}
        --pwaManifestPath {{paths.pwa_manifest}}
        --assetPath {{paths.pwa_assets}}

    # --- CSS ---
    css:
        series:
            - css-compile
            - css-prefix
            - css-rtl
            - css-minify

    css-compile: >
        npm: sass --style expanded --load-path="node_modules" --load-path="../../../node_modules"
        --source-map --embed-sources --no-error-css --quiet
        {{paths.scss}}/:{{paths.css_dist}}/

    css-rtl: >
        npm: cross-env NODE_ENV=RTL postcss --config {{configs.postcss}}
        --dir "{{paths.css_dist}}" --ext ".rtl.css"
        "{{paths.css_dist}}/*.css" "!{{paths.css_dist}}/*.min.css" "!{{paths.css_dist}}/*.rtl.css"

    css-lint: 'npm: stylelint "{{paths.scss}}/**/*.scss" --cache --cache-location .cache/.stylelintcache --rd'

    css-prefix: 'npm: postcss-cli --config {{configs.postcss}} --replace "{{paths.css_dist}}/*.css" "!{{paths.css_dist}}/*.rtl*.css" "!{{paths.css_dist}}/*.min.css"'

    css-minify: "path: deno run --allow-env --allow-read --allow-run --allow-write scripts/asset-handler.mjs --minify-css"

    # --- JS ---
    js:
        series:
            - js-compile
            - js-min

    js:prod:
        series:
            - js-compile:prod
            - js-min:prod

    js-compile: 'workspace: ts-builder "{{pkg.buildConfig.banner}}" --inputDir {{paths.js_src}} --outputDir {{paths.js_dist}}'
    js-compile:prod: 'workspace: ts-builder "{{pkg.buildConfig.banner}}" --inputDir {{paths.js_src}} --outputDir {{paths.js_dist}} --no-source-map'


    # many files .ts and .mjs use deno some still use node, moving towards deno for all, keep old linter for now
    js-lint:
        series:
            - "js-lint-deno"
            - "js-lint-node"

    js-lint-node: "npm: eslint --format=stylish ."
    js-lint-deno: "deno lint ./**/*.ts"


    js-min: "workspace: js-minify --inputDir {{paths.web_root}} --inputDir {{paths.web_dist}} --inputDir {{paths.cap_sync}}"
    js-min:prod: "workspace: js-minify --inputDir {{paths.web_root}} --inputDir {{paths.web_dist}} --inputDir {{paths.cap_sync}} --no-sourcemap --delete-source"

    # --- HTML / Docs ---
    htm-minify: "workspace: htm-minify --inputDir {{paths.web_root}} --inputDir {{paths.web_dist}} --inputDir {{paths.cap_sync}} --parallel cpu"

    docs-compile: "npm: astro --config {{configs.astro}} build"
    docs-compile-silent: "npm: astro --config {{configs.astro}} build --silent"
    # using tsconfig.astro.json to only check .astro files and not have eslint errors from .ts files in the astro config
    docs-lint: "npm: astro --config {{configs.astro}} --tsconfig ./tsconfig.astro.json check"
    docs-format: 'npm: prettier --write "{{paths.web_dist}}/**/*.html"'
    docs-serve-ssr: "npm: astro --config {{configs.astro_ssr}} dev --port 3001"

    move-astro-output-to-dist:
        series:
            - "fs: copy {{paths.web_dist}}/astrobuild/* {{paths.web_dist}}"
            - "fs: rm {{paths.web_dist}}/astrobuild"

    # --- Build Pipelines ---
    generate-data: "path: deno run --allow-read --allow-write scripts/generate-offline-data.mjs"

    comp1:
        series:
            - assets:prepare
            - assets:icons
            - docs-compile
            #- docs-compile

    comp1:prod:
        series:
            - assets:prepare
            - assets:icons
            - docs-compile-silent # use silent to avoid massive console outputs
            #- docs-compile

    compile-parallel:
        parallel:
            - css
            - js
            - webp

    compile-parallel:prod:
        parallel:
            - css
            - js:prod
            - webp

    compile:
        series:
            - compile-parallel
            - comp1
            - docs-format
            - move-astro-output-to-dist
            - generate-data
            - assets:handle

    compile:prod:
        series:
            - compile-parallel:prod
            - comp1:prod
            - docs-format
            - move-astro-output-to-dist
            - generate-data
            - assets:handle

    # main
    build:
        series:
            - clean
            - compile
            - generate-sitemap

    prod-comp:
        series:
            - clean
            - appAssetsGen
            - compile:prod
            - htm-minify

    # main
    production:
        series:
            - assets:prod
            - clean
            - appAssetsGen
            - lint
            - compile:prod
            - htm-minify
            - generate-sitemap
            - capSync

    generate-sitemap: "path: deno run --allow-read --allow-write scripts/generate-sitemap.ts"

    capSync: "npm: @capacitor/cli sync"

    # --- Dev / Watch ---
    dev-apache-server:
        cmd: "workspace: apache-cli start --output --document-root ./{{paths.web_root}} --port 8080"
        interactive: true
    dev-caddy-server: "caddy-cli start --output --ConfigFile ./{{configs.caddy}} --DocumentRoot ./{{paths.web_root}}"

    dev-apache-watch:
        parallel:
            - watch
            - dev-apache-server

    dev-caddy-watch:
        parallel:
            - watch
            - dev-caddy-server

    # main
    dev:
        series:
            - assets:dev
            - build
            - dev-caddy-watch

    # main
    dev-prod:
        series:
            - assets:prod
            - production
            - dev-caddy-watch

    # --- PHP Build ---
    # these three allow for php <?php ?> tags to be inside .astro files by commenting them out before astrobuild and restoring them in source and output after
    # this is currently unused and would require re-adding php execution to the watch-updates.mjs script to function in dev mode
    #build:php: "build-php full"
    #php:prebuild: "workspace:build-php pre"   ## run anytime before astro build to prepare .astro files with php tags
    #php:postbuild: "workspace:build-php post" ## run only after all html related build steps are done to restore php tags in source and html output
    # to use pure .php files simply place them in source/web these files are always in www/dist and www/website as-is not included in www/capacitorsync and is not processed by any tools

    ##
    # --- .NET API ---
    ##

    update-api-www-no-build: "path: deno run --allow-env --allow-read --allow-run --allow-write scripts/asset-handler.mjs --update-api"
    update-api-www:
        - compile
        - update-api-www-no-build

    # main
    dotnet:run: "cd {{paths.api_dir}}; dotnet run -c Debug --project ./{{paths.api_proj}} --framework net10.0"
    # build and run dotnet:build-release-win, this wont work with dev-prod yet as it uses actuall prod servers
    # this can be used with dev server as it uses localhost
    # copy dev users.db into exe folder Sites\Anime-Dimension\main\subModules\db\users.db
    dotnet:run-prod:
        series:
            - dotnet:build-release-win
            - "fs: copy ./subModules/db/users.db ./subModules/publish/win-x64/"
            - "path: ./subModules/publish/win-x64/ASP.NETCoreWebApi.exe"

    ## disabled PublishTimmed to reduce possible issues it could introduce

    # main
    dotnet:build-release-linux:
        series:
            - update-api-www-no-build
            - >
                cross-shell: cd {{paths.api_dir}}; rimraf {{paths.api_pub_linux}};
                dotnet publish ./{{paths.api_proj}} -c Release -f net10.0 -r linux-x64 --self-contained true
                -p:PublishSingleFile=true -p:PublishTrimmed=false -p:IncludeAllContentForSelfExtract=true -o {{paths.api_pub_linux}}

    # main
    dotnet:build-release-linux-arm:
        series:
            - update-api-www-no-build
            - >
                cross-shell: cd {{paths.api_dir}}; rimraf {{paths.api_pub_linux_arm}};
                dotnet publish ./{{paths.api_proj}} -c Release -f net10.0 -r linux-arm64 --self-contained true
                -p:PublishSingleFile=true -p:PublishTrimmed=false -p:IncludeAllContentForSelfExtract=true -o {{paths.api_pub_linux_arm}}

    # main
    dotnet:build-release-win:
        series:
            - update-api-www
            - >
                cross-shell: cd {{paths.api_dir}}; rimraf {{paths.api_pub_win}};
                dotnet publish ./{{paths.api_proj}} -c Release -f net10.0 -r win-x64 --self-contained true
                -p:PublishSingleFile=true -p:PublishTrimmed=false -p:IncludeAllContentForSelfExtract=true -o {{paths.api_pub_win}}

    #
    # --- Deployment ---
    #
    deploy:www-us: "workspace:deploy --www-us"
    deploy:www-eu: "workspace:deploy --www-eu"

    deploy:cs-us: "workspace:deploy --cs-us"
    deploy:cs-eu-arm: "workspace:deploy --cs-eu-arm"

    # deploy the 'buildConfig\remote\Caddyfile' to Prod
    deploy:conf-eu-www: "workspace:deploy --configs-eu-caddy"
    deploy:conf-us-www: "workspace:deploy --configs-us-caddy"

    # deploy the 'buildConfig\remote\animedimension.service' to Prod
    # this is the service for the .NET API
    deploy:conf-eu-api: "workspace:deploy --configs-eu-service"
    deploy:conf-us-api: "workspace:deploy --configs-us-service"

    ww-d:
        series:
            - production
            - deploy:www-us
            - deploy:www-eu

    # build website as prod, then build the us api then upload www only to us server
    ww-d-us:
        series:
            - production
            - dotnet:build-release-linux
            - deploy:www-us

    # build and deploy only US C# API backend
    api-d:
        series:
            - dotnet:build-release-linux
            - deploy:cs-us

    # build and deploy only EU ARM C# API backend
    api-d-arm:
        series:
            - dotnet:build-release-linux-arm
            - deploy:cs-eu-arm

    # Compile Production astro ts css Build
    # compile prod C# api build for linux and linux arm
    # deploy website to both servers
    # deploy api to both servers
    # deploy www Caddyfile to both servers
    # deploy API service file to both servers
    deploy-all-prod:
        series:
            - ww-d
            - api-d
            - api-d-arm
            - deploy:conf-eu-www
            - deploy:conf-us-www
            - deploy:conf-eu-api
            - deploy:conf-us-api

    deploy-prod:
        series:
            - ww-d
            - api-d
            - api-d-arm

    # deploy website only
    deploy-www-only:
        series:
            - ww-d

    # deploy only API to production servers
    deploy-api-only:
        series:
            - api-d
            - api-d-arm
